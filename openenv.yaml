name: "shopeasy-support-gym"
version: "1.0.0"
description: "ShopEasy Customer Support Resolution Gym"

runtime:
  entrypoint: "server.app:app"
  type: "fastapi"
  port: 8000

tasks:
  - id: "simple_refund"
    grader: "tasks:grade"
  - id: "delivery_tracking"
    grader: "tasks:grade"
  - id: "fraud_risk"
    grader: "tasks:grade"

metadata:
  min_tasks: 3
  score_range:
    min: 0.10
    max: 0.90