name: "shopeasy-support-gym"
version: "1.0.0"
description: "ShopEasy Customer Support Resolution Gym"

runtime:
  entrypoint: "server.app:app"
  type: "fastapi"
  port: 8000

# Explicitly mapping the custom python grader
tasks:
  - id: "simple_refund"
    grader:
      type: "custom"
      entrypoint: "reward.grader:grade"
  - id: "delivery_tracking"
    grader:
      type: "custom"
      entrypoint: "reward.grader:grade"
  - id: "fraud_risk"
    grader:
      type: "custom"
      entrypoint: "reward.grader:grade"

metadata:
  min_tasks: 3
  score_range:
    min: 0.02
    max: 0.98