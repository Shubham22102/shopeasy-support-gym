spec_version: 1
name: shopeasy-support-gym
version: 1.0.0
description: |
  A high-fidelity Customer Support Resolution Gym simulating an e-commerce platform's
  helpdesk. AI agents handle multi-turn customer conversations, resolve real-world 
  issues across 12 distinct scenarios, and utilize tools like order lookup, refunds, 
  and escalations, while managing customer sentiment and fraud risks.
author: "Shubham Kumar"
type: space
runtime: fastapi
app: server.app:app
port: 8000

observation_space:
  type: text
  description: >
    Natural language customer support conversation including customer messages,
    ticket context, order details, and available tool outputs.

action_space:
  type: discrete
  actions:
    - resolve
    - escalate
    - refund
    - search_kb
    - lookup_order
    - hold
  description: >
    Customer support actions for handling tickets.

endpoints:
  health: /
  reset:  /reset
  step:   /step
  state:  /state
  grade:  /grader

tasks:
  - id: simple_refund
    grader: "grader.support_tasks:SimpleRefundGrader"
    description: "Easy: Customer wants a refund within the return window."
    difficulty: easy
    steps: 3
    ideal_action: refund

  - id: delivery_tracking
    grader: "grader.support_tasks:DeliveryTrackingGrader"
    description: "Easy: Customer asks where their order is."
    difficulty: easy
    steps: 3
    ideal_action: lookup_order

  - id: kb_policy_question
    grader: "grader.support_tasks:KbPolicyQuestionGrader"
    description: "Easy: Customer asks about return policy."
    difficulty: easy
    steps: 3
    ideal_action: search_kb

  - id: cancellation_request
    grader: "grader.support_tasks:CancellationRequestGrader"
    description: "Easy: Customer wants to cancel a pending order."
    difficulty: easy
    steps: 3
    ideal_action: resolve

  - id: expired_return
    grader: "grader.support_tasks:ExpiredReturnGrader"
    description: "Medium: Return request outside the policy window."
    difficulty: medium
    steps: 3
    ideal_action: search_kb

  - id: wrong_item_sent
    grader: "grader.support_tasks:WrongItemSentGrader"
    description: "Medium: Customer received incorrect product."
    difficulty: medium
    steps: 3
    ideal_action: refund

  - id: duplicate_charge
    grader: "grader.support_tasks:DuplicateChargeGrader"
    description: "Medium: Customer was charged twice."
    difficulty: medium
    steps: 3
    ideal_action: refund

  - id: partial_order
    grader: "grader.support_tasks:PartialOrderGrader"
    description: "Medium: Customer only received part of their order."
    difficulty: medium
    steps: 3
    ideal_action: refund

  - id: damaged_item
    grader: "grader.support_tasks:DamagedItemGrader"
    description: "Hard: Item arrived broken — instant refund policy applies."
    difficulty: hard
    steps: 3
    ideal_action: refund

  - id: angry_customer
    grader: "grader.support_tasks:AngryCustomerGrader"
    description: "Hard: Extremely angry customer, agent must de-escalate."
    difficulty: hard
    steps: 3
    ideal_action: resolve

  - id: fraud_risk
    grader: "grader.support_tasks:FraudRiskGrader"
    description: "Hard: Suspicious request must be escalated, not refunded."
    difficulty: hard
    steps: 3
    ideal_action: escalate

  - id: vip_warranty_claim
    grader: "grader.support_tasks:VipWarrantyClaimGrader"
    description: "Hard: VIP customer warranty claim for electronics."
    difficulty: hard
    steps: 3
    ideal_action: resolve

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.5
  score_formula: mean(step_rewards)

constraints:
  max_runtime_seconds: 1200
  max_memory_gb: 8
  max_vcpu: 2

env_vars:
  - API_BASE_URL
  - MODEL_NAME
  - HF_TOKEN
  - OPENAI_API_KEY
  - DEFAULT_TASK_ID
  - DEFAULT_DIFFICULTY

resources:
  cpu: 2
  memory: 8Gi
